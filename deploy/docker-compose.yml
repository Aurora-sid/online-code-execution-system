version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: code_exec_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: code_exec
      MYSQL_USER: codeexec
      MYSQL_PASSWORD: codeexec123
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - code_exec_net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: code_exec_redis
    ports:
      - "16379:6379"
    networks:
      - code_exec_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  code_exec_net:
    driver: bridge

volumes:
  mysql_data:
