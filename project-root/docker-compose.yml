version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: online-code-editor-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: online_code_editor
      MYSQL_USER: editor
      MYSQL_PASSWORD: editor123
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network

  redis:
    image: redis:7.0-alpine
    container_name: online-code-editor-redis
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: online-code-editor-backend
    restart: always
    environment:
      PORT: "8080"
      MYSQL_DSN: "editor:editor123@tcp(mysql:3306)/online_code_editor?charset=utf8mb4&parseTime=True&loc=Local"
      REDIS_ADDR: "redis:6379"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    networks:
      - app-network

volumes:
  mysql_data:
  redis_data:

networks:
  app-network:
    driver: bridge