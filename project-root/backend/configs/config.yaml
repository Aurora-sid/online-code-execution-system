server:
  port: 8080
  read_timeout: 5s
  write_timeout: 10s
  idle_timeout: 120s

mysql:
  dsn: "editor:editor123@tcp(mysql:3306)/online_code_editor?charset=utf8mb4&parseTime=True&loc=Local"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 1h

redis:
  addr: "redis:6379"
  password: ""
  db: 0
  pool_size: 10

jwt:
  secret: "your-secret-key-here"
  expire_time: 24h

container:
  default_memory: 128MB
  default_cpu: 0.5
  default_timeout: 10s
  pool_size: 10

languages:
  - name: "python"
    version: "3.10"
    image: "python:3.10-alpine"
    command: "python main.py"
  - name: "go"
    version: "1.20"
    image: "golang:1.20-alpine"
    command: "go run main.go"
  - name: "java"
    version: "17"
    image: "openjdk:17-alpine"
    command: "javac Main.java && java Main"