<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Aurora Code - 在线代码执行平台">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="color-scheme" content="dark">

  <title>Aurora Code</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />

  <!-- 内联关键 CSS：消除白屏 -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #09090b;
    }

    #app {
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #09090b;
      gap: 16px;
    }

    .aurora-loader {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(139, 92, 246, 0.2);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      color: #71717a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>


</head>

<body>
  <!-- 骨架屏：Vue 挂载后自动替换 -->
  <div id="app">
    <div class="loading-screen">
      <div class="aurora-loader"></div>
      <div class="loading-text">Loading Aurora Code...</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
